<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"/>

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | absolute_url }}"/>

  <!-- Google Fonts: Geist, Inter, JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind CDN with config -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":              "#f59e0b",
            "primary-fixed-dim":    "#d97706",
            "on-primary":           "#1a0a00",
            "dark-bg":              "#051424",
            "light-bg":             "#F8FAFC",
            "dark-surface":         "rgba(18, 33, 49, 0.85)",
            "light-surface":        "rgba(255, 255, 255, 0.85)",
            "dark-border":          "#1c2b3c",
            "light-border":         "#E2E8F0",
            "dark-text":            "#d4e4fa",
            "light-text":           "#1E293B",
            "dark-text-variant":    "#94a3b8",
            "light-text-variant":   "#475569",
            "surface-container":    "#122131",
            "dark-footer":          "#0d1c2d"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg:      "0.5rem",
            xl:      "0.75rem",
            "2xl":   "1rem",
            full:    "9999px"
          },
          spacing: {
            "margin-desktop": "64px",
            "margin-mobile":  "16px",
            "gutter":         "24px",
            "max-width":      "1280px"
          },
          fontFamily: {
            "display":   ["Geist", "sans-serif"],
            "headline":  ["Geist", "sans-serif"],
            "body":      ["Inter", "sans-serif"],
            "mono":      ["JetBrains Mono", "monospace"]
          },
          fontSize: {
            "display-lg":        ["48px", {lineHeight:"56px", letterSpacing:"-0.02em", fontWeight:"700"}],
            "display-lg-mobile": ["32px", {lineHeight:"40px", letterSpacing:"-0.01em", fontWeight:"700"}],
            "headline-md":       ["24px", {lineHeight:"32px", fontWeight:"600"}],
            "body-lg":           ["18px", {lineHeight:"28px", fontWeight:"400"}],
            "body-md":           ["16px", {lineHeight:"24px", fontWeight:"400"}],
            "body-sm":           ["14px", {lineHeight:"20px", fontWeight:"400"}],
            "label-caps":        ["12px", {lineHeight:"16px", letterSpacing:"0.05em", fontWeight:"600"}],
            "code-sm":           ["14px", {lineHeight:"20px", fontWeight:"400"}]
          },
          boxShadow: {
            "glow-primary":  "0 0 20px rgba(245,158,11,0.25)",
            "glow-primary-lg": "0 0 40px rgba(245,158,11,0.15)"
          },
          backdropBlur: {
            xs: "4px"
          }
        }
      }
    }
  </script>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}"/>

  <!-- Basic SEO meta tags -->
  <meta name="author" content="{{ site.author.name }}"/>
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}"/>
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"/>
  <meta property="og:url" content="{{ page.url | absolute_url }}"/>
  <meta property="og:type" content="website"/>

  <!-- Theme toggle script -->
  <script>
    // Apply saved theme before page renders to avoid flash
    (function() {
      const saved = localStorage.getItem('biscuits-theme');
      if (saved === 'light') {
        document.documentElement.classList.remove('dark');
      }
    })();
    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('biscuits-theme', html.classList.contains('dark') ? 'dark' : 'light');
    }
  </script>
</head>
<body class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text antialiased min-h-screen relative font-body transition-colors duration-300">

  <!-- Grain texture overlay -->
  <div class="fixed inset-0 pointer-events-none z-0 opacity-30 dark:opacity-20"
       style="background-image:url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%220.04%22/%3E%3C/svg%3E')"></div>

  <!-- Navigation -->
  {% include nav.html %}

  <!-- Page content -->
  <main class="pt-[80px] relative z-10">
    {{ content }}
  </main>

  <!-- Footer -->
  {% include footer.html %}

</body>
</html>
