title: "bISCuits Research Group"
description: "Cybersecurity research group at University Politehnica of Bucharest. Proactive vulnerability research, iOS/IoT security, and ethical hacking."
baseurl: ""
url: "http://biscuits.cs.pub.ro"

# Author & Contact
author:
  name: "bISCuits Research Group"
  email: "mihai.chiroiu@upb.ro"
  affiliation: "University Politehnica of Bucharest"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap


# Sass
sass:
  style: compressed
  sass_dir: assets/css

# Navigation
nav_links:
  - title: "Home"
    url: "/"
  - title: "About Us"
    url: "/about/"
  - title: "Team"
    url: "/team/"
  - title: "Research"
    url: "/research/"
  - title: "Teaching"
    url: "/teaching/"
  - title: "Contact"
    url: "/contact/"

# Social
social:
  github: "https://github.com/biscuits-research"
  linkedin: "#"
  twitter: "#"

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
  - README.md
  - Dockerfile
  - Dockerfile.dev
  - docker-compose.yml
  - .ruby-version
